<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TestYourTier | Futuristic PvP Rankings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#050505',
                        neonBlue: '#00f2ff',
                        neonPurple: '#bc13fe',
                        glass: 'rgba(255, 255, 255, 0.03)',
                        tier1: '#FFD700', // Gold
                        tier2: '#C0C0C0', // Silver
                        tier3: '#A855F7', // Purple
                        tier4: '#3B82F6', // Blue
                        tier5: '#6B7280', // Gray
                    },
                    fontFamily: {
                        orbitron: ['Orbitron', 'sans-serif'],
                        inter: ['Inter', 'sans-serif'],
                    },
                    backgroundImage: {
                        'glow-gradient': 'radial-gradient(circle at 50% 50%, rgba(188, 19, 254, 0.15) 0%, rgba(5, 5, 5, 1) 70%)',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; }
        .neon-border-blue { border: 1px solid #00f2ff; box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }
        .neon-border-purple { border: 1px solid #bc13fe; box-shadow: 0 0 15px rgba(188, 19, 254, 0.2); }
        .neon-text-blue { text-shadow: 0 0 10px rgba(0, 242, 255, 0.5); color: #00f2ff; }
        .neon-text-purple { text-shadow: 0 0 10px rgba(188, 19, 254, 0.5); color: #bc13fe; }
        .bg-animate { background: linear-gradient(-45deg, #050505, #111, #050505, #0a0a0a); background-size: 400% 400%; animation: gradient 15s ease infinite; }
        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        canvas#particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .nav-link { position: relative; transition: all 0.3s ease; }
        .nav-link::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 0; height: 2px; background: #00f2ff; transition: width 0.3s; }
        .nav-link:hover::after { width: 100%; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #050505; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #bc13fe; }
        .btn-glow:hover { transform: translateY(-2px); box-shadow: 0 0 20px rgba(0, 242, 255, 0.4); }
        .tier-badge { padding: 2px 8px; border-radius: 4px; font-weight: 800; font-size: 0.75rem; border: 1px solid currentColor; }
        .modal-enter { animation: modalIn 0.3s ease-out forwards; }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-animate min-h-screen">
    <canvas id="particles"></canvas>

    <!-- App Root -->
    <div id="app-content">
        <!-- Content injected via JS -->
    </div>

    <script>
        // --- DATA & STATE ---
        const ADMIN_PASS = "TYT-ADMIN-2026";
        const DISCORD_LINK = "https://discord.gg/88QK23zeAu";
        
        const state = {
            currentUser: JSON.parse(localStorage.getItem('tyt_user')) || null,
            adminUnlocked: localStorage.getItem('tyt_admin') === 'true',
            view: 'home',
            players: [
                { name: 'Dream', tier: 'HT1', region: 'NA', elo: 2450, skin: 'Dream', badges: ['🏆', '⚔️'] },
                { name: 'Technoblade', tier: 'HT1', region: 'NA', elo: 2445, skin: 'Technoblade', badges: ['👑', '⚔️'] },
                { name: 'StimpyPVP', tier: 'HT2', region: 'EU', elo: 2310, skin: 'StimpyPVP', badges: ['⚡'] },
                { name: 'Fruitberries', tier: 'HT1', region: 'NA', elo: 2405, skin: 'Fruitberries', badges: ['🍎'] },
                { name: 'Sapnap', tier: 'HT2', region: 'NA', elo: 2280, skin: 'Sapnap', badges: ['🔥'] },
                { name: 'Danteh', tier: 'HT3', region: 'NA', elo: 2150, skin: 'Danteh', badges: ['💎'] },
                { name: 'Marlow', tier: 'LT1', region: 'EU', elo: 1950, skin: 'MarlowWW', badges: [] },
                { name: 'KoryPvP', tier: 'LT2', region: 'AS', elo: 1820, skin: 'Kory', badges: [] },
            ],
            activity: [
                { text: "Dream promoted to HT1", time: "2m ago" },
                { text: "Technoblade joined the Diamond tier", time: "15m ago" },
                { text: "Season 4 Rank Reset announced", time: "1h ago" },
                { text: "New rule update for Crystal PvP", time: "3h ago" }
            ]
        };

        const getTierColor = (tier) => {
            if (tier.includes('1')) return '#FFD700';
            if (tier.includes('2')) return '#C0C0C0';
            if (tier.includes('3')) return '#A855F7';
            if (tier.includes('4')) return '#3B82F6';
            return '#6B7280';
        };

        // --- COMPONENTS ---

        const Navbar = () => `
            <nav class="fixed top-0 left-0 w-full z-50 px-6 py-4 flex items-center justify-between border-b border-white/10 bg-dark/80 backdrop-blur-lg">
                <div class="flex items-center space-x-8">
                    <div class="flex items-center cursor-pointer" onclick="navigate('home')">
                        <span class="text-2xl font-black font-orbitron tracking-tighter neon-text-blue">TEST</span>
                        <span class="text-2xl font-black font-orbitron tracking-tighter text-white">YOURTIER</span>
                    </div>
                    <div class="hidden md:flex space-x-6 text-sm font-semibold uppercase tracking-widest text-gray-400">
                        <a href="javascript:void(0)" onclick="navigate('home')" class="nav-link hover:text-white">Home</a>
                        <a href="javascript:void(0)" onclick="navigate('leaderboards')" class="nav-link hover:text-white">Leaderboards</a>
                        <a href="javascript:void(0)" onclick="navigate('staff')" class="nav-link hover:text-white">Staff</a>
                        <a href="javascript:void(0)" onclick="navigate('rules')" class="nav-link hover:text-white">Rules</a>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="${DISCORD_LINK}" target="_blank" class="hidden sm:flex items-center px-4 py-2 rounded-md bg-[#5865F2] hover:bg-[#4752c4] transition-all text-xs font-bold uppercase">
                        <i class="fab fa-discord mr-2"></i> Discord
                    </a>
                    <div class="relative group">
                        <button class="flex items-center space-x-2 bg-white/5 p-1 pr-3 rounded-full hover:bg-white/10 transition-all border border-white/10">
                            <img src="https://mc-heads.net/avatar/${state.currentUser?.username || 'Steve'}" class="w-8 h-8 rounded-full border border-neonPurple" alt="pfp">
                            <span class="text-xs font-bold">${state.currentUser?.username || 'Guest'}</span>
                            <i class="fas fa-chevron-down text-[10px] text-gray-500"></i>
                        </button>
                        <div class="absolute right-0 mt-2 w-48 glass-card border-white/10 hidden group-hover:block overflow-hidden">
                            <a href="javascript:void(0)" onclick="openProfile('${state.currentUser?.username}')" class="block px-4 py-3 text-xs hover:bg-white/5 transition-all"><i class="fas fa-user mr-2 text-neonBlue"></i> Profile</a>
                            <a href="javascript:void(0)" onclick="openAdmin()" class="block px-4 py-3 text-xs hover:bg-white/5 transition-all"><i class="fas fa-cog mr-2 text-neonPurple"></i> Admin Panel</a>
                            <a href="javascript:void(0)" onclick="logout()" class="block px-4 py-3 text-xs hover:bg-red-500/20 text-red-400 transition-all border-t border-white/5"><i class="fas fa-sign-out-alt mr-2"></i> Logout</a>
                        </div>
                    </div>
                </div>
            </nav>
        `;

        const Footer = () => `
            <footer class="border-t border-white/10 py-12 px-6 mt-20">
                <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center space-y-8 md:space-y-0">
                    <div>
                        <div class="flex items-center mb-4">
                            <span class="text-xl font-black font-orbitron tracking-tighter neon-text-blue">TEST</span>
                            <span class="text-xl font-black font-orbitron tracking-tighter text-white">YOURTIER</span>
                        </div>
                        <p class="text-gray-500 text-sm max-w-xs">The ultimate destination for competitive Minecraft PvP ranking and matchmaking.</p>
                    </div>
                    <div class="flex space-x-12">
                        <div>
                            <h4 class="text-white font-bold text-xs uppercase mb-4">Platform</h4>
                            <ul class="text-gray-500 text-xs space-y-2">
                                <li><a href="#" onclick="navigate('leaderboards')" class="hover:text-neonBlue">Rankings</a></li>
                                <li><a href="#" class="hover:text-neonBlue">Statistics</a></li>
                                <li><a href="#" onclick="navigate('rules')" class="hover:text-neonBlue">Guidelines</a></li>
                            </ul>
                        </div>
                        <div>
                            <h4 class="text-white font-bold text-xs uppercase mb-4">Social</h4>
                            <ul class="text-gray-500 text-xs space-y-2">
                                <li><a href="${DISCORD_LINK}" target="_blank" class="hover:text-neonBlue">Discord</a></li>
                                <li><a href="#" class="hover:text-neonBlue">Twitter</a></li>
                            </ul>
                        </div>
                    </div>
                </div>
                <div class="text-center mt-12 text-gray-600 text-[10px] font-mono">
                    © 2026 TESTYOURTIER - NOT AN OFFICIAL MINECRAFT SERVICE.
                </div>
            </footer>
        `;

        // --- VIEWS ---

        const AuthView = (type = 'login') => {
            const isLogin = type === 'login';
            return `
                <div class="min-h-screen flex items-center justify-center p-6">
                    <div class="w-full max-w-md glass-card p-8 border-neonPurple/30 shadow-2xl relative overflow-hidden">
                        <div class="absolute -top-24 -right-24 w-48 h-48 bg-neonPurple/20 blur-[100px]"></div>
                        <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-neonBlue/20 blur-[100px]"></div>
                        
                        <div class="text-center mb-8">
                            <h2 class="text-3xl font-orbitron font-black text-white mb-2">${isLogin ? 'SYSTEM LOGIN' : 'CREATE ACCOUNT'}</h2>
                            <p class="text-gray-400 text-sm">Access the competitive database</p>
                        </div>

                        <form id="auth-form" class="space-y-4">
                            ${!isLogin ? `
                                <div>
                                    <label class="block text-[10px] text-gray-400 uppercase font-bold mb-1">Full Name</label>
                                    <input type="text" id="reg-name" required class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-neonPurple" placeholder="John Doe">
                                </div>
                            ` : ''}
                            <div>
                                <label class="block text-[10px] text-gray-400 uppercase font-bold mb-1">Username</label>
                                <input type="text" id="auth-user" required class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-neonBlue" placeholder="MinecraftUsername">
                            </div>
                            ${!isLogin ? `
                                <div>
                                    <label class="block text-[10px] text-gray-400 uppercase font-bold mb-1">Email Address</label>
                                    <input type="email" id="reg-email" required class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-neonPurple" placeholder="alex@example.com">
                                </div>
                            ` : ''}
                            <div>
                                <label class="block text-[10px] text-gray-400 uppercase font-bold mb-1">Password</label>
                                <div class="relative">
                                    <input type="password" id="auth-pass" required class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-neonBlue" placeholder="••••••••">
                                </div>
                            </div>
                            ${!isLogin ? `
                                <div>
                                    <label class="block text-[10px] text-gray-400 uppercase font-bold mb-1">Confirm Password</label>
                                    <input type="password" id="reg-confirm" required class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-neonPurple" placeholder="••••••••">
                                </div>
                            ` : ''}
                            
                            <button type="submit" id="auth-btn" class="w-full py-4 rounded-lg bg-gradient-to-r from-neonPurple to-neonBlue text-white font-bold uppercase text-xs tracking-widest hover:opacity-90 transition-all btn-glow mt-4">
                                ${isLogin ? 'Authorize Access' : 'Register Pilot'}
                            </button>
                        </form>

                        <div class="mt-6 text-center">
                            <button onclick="renderAuth('${isLogin ? 'signup' : 'login'}')" class="text-xs text-gray-400 hover:text-white transition-all">
                                ${isLogin ? "Don't have an account? <span class='text-neonBlue'>Register</span>" : "Already have an account? <span class='text-neonPurple'>Login</span>"}
                            </button>
                        </div>
                    </div>
                </div>
            `;
        };

        const HomeView = () => `
            ${Navbar()}
            <main class="pt-32 pb-20 px-6 max-w-7xl mx-auto">
                <!-- Hero Section -->
                <section class="text-center mb-32 relative">
                    <div class="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-[500px] bg-neonBlue/5 blur-[120px] rounded-full pointer-events-none"></div>
                    <div class="inline-block px-4 py-1 rounded-full border border-neonBlue/30 bg-neonBlue/10 text-neonBlue text-[10px] font-bold uppercase tracking-[0.2em] mb-6">Competitive Tiering v2.6</div>
                    <h1 class="text-5xl md:text-8xl font-orbitron font-black text-white mb-6 leading-tight">ASCEND THE <br> <span class="neon-text-purple">LEADERBOARDS</span></h1>
                    <p class="text-gray-400 max-w-2xl mx-auto text-lg mb-10">The most precise skill-based ranking system for Minecraft PvP. Track progress, find competitors, and prove your tier.</p>
                    <div class="flex flex-col sm:flex-row items-center justify-center space-y-4 sm:space-y-0 sm:space-x-6">
                        <button onclick="navigate('leaderboards')" class="px-10 py-4 rounded-md bg-white text-black font-bold uppercase text-xs tracking-widest hover:bg-neonBlue hover:text-white transition-all btn-glow">View Rankings</button>
                        <a href="${DISCORD_LINK}" target="_blank" class="px-10 py-4 rounded-md bg-white/5 border border-white/10 text-white font-bold uppercase text-xs tracking-widest hover:bg-white/10 transition-all">Join Community</a>
                    </div>
                </section>

                <!-- Gamemodes -->
                <section class="mb-32">
                    <div class="flex justify-between items-end mb-12">
                        <div>
                            <h2 class="text-2xl font-orbitron font-black">GAMEMODES</h2>
                            <div class="w-12 h-1 bg-neonPurple mt-2"></div>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
                        ${['Sword', 'Crystal', 'Axe', 'LT', 'HT', 'SMP'].map(mode => `
                            <div class="glass-card p-6 text-center hover:neon-border-blue cursor-pointer transition-all group">
                                <div class="text-3xl mb-4 group-hover:scale-110 transition-all">
                                    ${mode === 'Sword' ? '⚔️' : mode === 'Crystal' ? '💎' : mode === 'Axe' ? '🪓' : '🏆'}
                                </div>
                                <h3 class="text-xs font-black font-orbitron text-gray-400 group-hover:text-white">${mode}</h3>
                            </div>
                        `).join('')}
                    </div>
                </section>

                <!-- Trending & Activity -->
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
                    <section class="lg:col-span-2">
                        <div class="flex justify-between items-end mb-8">
                            <h2 class="text-2xl font-orbitron font-black uppercase">Trending Players</h2>
                            <button onclick="navigate('leaderboards')" class="text-xs text-neonBlue font-bold hover:underline">See All</button>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            ${state.players.slice(0, 4).map(p => `
                                <div class="glass-card p-4 flex items-center justify-between hover:bg-white/5 transition-all cursor-pointer" onclick="openProfile('${p.name}')">
                                    <div class="flex items-center space-x-4">
                                        <div class="relative">
                                            <img src="https://mc-heads.net/avatar/${p.name}" class="w-12 h-12 rounded-lg" alt="">
                                            <div class="absolute -bottom-1 -right-1 w-3 h-3 bg-green-500 rounded-full border-2 border-dark"></div>
                                        </div>
                                        <div>
                                            <h4 class="font-bold text-sm">${p.name}</h4>
                                            <span class="text-[10px] text-gray-500 font-mono">${p.elo} Rating</span>
                                        </div>
                                    </div>
                                    <div class="tier-badge" style="color: ${getTierColor(p.tier)}">${p.tier}</div>
                                </div>
                            `).join('')}
                        </div>
                    </section>
                    
                    <section>
                        <h2 class="text-2xl font-orbitron font-black uppercase mb-8">Live Feed</h2>
                        <div class="glass-card overflow-hidden">
                            ${state.activity.map(act => `
                                <div class="p-4 border-b border-white/5 flex items-start space-x-4">
                                    <div class="w-2 h-2 rounded-full bg-neonBlue mt-1.5 shadow-[0_0_5px_#00f2ff]"></div>
                                    <div>
                                        <p class="text-xs text-gray-300 font-medium">${act.text}</p>
                                        <span class="text-[9px] text-gray-600 uppercase font-bold">${act.time}</span>
                                    </div>
                                </div>
                            `).join('')}
                            <div class="p-4 text-center">
                                <span class="text-[9px] text-gray-500 uppercase tracking-widest animate-pulse">Scanning Matches...</span>
                            </div>
                        </div>
                    </section>
                </div>
            </main>
            ${Footer()}
        `;

        const LeaderboardView = () => `
            ${Navbar()}
            <main class="pt-32 pb-20 px-6 max-w-7xl mx-auto">
                <div class="mb-12 text-center">
                    <h1 class="text-4xl font-orbitron font-black text-white mb-2">GLOBAL RANKINGS</h1>
                    <p class="text-gray-500">The world's best players, tiered by performance.</p>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-12 items-end">
                    <!-- Podium -->
                    <div class="lg:col-span-3 flex flex-col md:flex-row justify-center items-end space-y-8 md:space-y-0 md:space-x-8 mb-12">
                        <!-- Rank 2 -->
                        <div class="flex flex-col items-center order-2 md:order-1">
                            <div class="relative mb-4">
                                <img src="https://mc-heads.net/avatar/${state.players[1].name}" class="w-20 h-20 rounded-xl border-2 border-tier2 shadow-[0_0_20px_rgba(192,192,192,0.3)]" alt="">
                                <div class="absolute -top-3 -right-3 w-8 h-8 bg-tier2 text-black flex items-center justify-center font-bold rounded-full">2</div>
                            </div>
                            <span class="text-sm font-bold">${state.players[1].name}</span>
                            <span class="text-xs text-tier2 font-mono">${state.players[1].elo}</span>
                        </div>
                        <!-- Rank 1 -->
                        <div class="flex flex-col items-center order-1 md:order-2 scale-110">
                            <div class="relative mb-4">
                                <img src="https://mc-heads.net/avatar/${state.players[0].name}" class="w-28 h-28 rounded-xl border-2 border-tier1 shadow-[0_0_30px_rgba(255,215,0,0.4)]" alt="">
                                <div class="absolute -top-4 -right-4 w-10 h-10 bg-tier1 text-black flex items-center justify-center font-black rounded-full text-lg">1</div>
                            </div>
                            <span class="text-lg font-bold neon-text-blue">${state.players[0].name}</span>
                            <span class="text-sm text-tier1 font-mono">${state.players[0].elo}</span>
                        </div>
                        <!-- Rank 3 -->
                        <div class="flex flex-col items-center order-3 md:order-3">
                            <div class="relative mb-4">
                                <img src="https://mc-heads.net/avatar/${state.players[3].name}" class="w-20 h-20 rounded-xl border-2 border-amber-600 shadow-[0_0_20px_rgba(180,83,9,0.3)]" alt="">
                                <div class="absolute -top-3 -right-3 w-8 h-8 bg-amber-600 text-black flex items-center justify-center font-bold rounded-full">3</div>
                            </div>
                            <span class="text-sm font-bold">${state.players[3].name}</span>
                            <span class="text-xs text-amber-600 font-mono">${state.players[3].elo}</span>
                        </div>
                    </div>
                </div>

                <!-- Table Controls -->
                <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-6">
                    <div class="flex space-x-2">
                        <select class="bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-xs focus:outline-none focus:border-neonBlue">
                            <option>All Gamemodes</option>
                            <option>Sword</option>
                            <option>Crystal</option>
                            <option>Axe</option>
                        </select>
                        <select class="bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-xs focus:outline-none focus:border-neonBlue">
                            <option>All Regions</option>
                            <option>NA</option>
                            <option>EU</option>
                            <option>AS</option>
                        </select>
                    </div>
                    <div class="relative w-full md:w-64">
                        <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-xs"></i>
                        <input type="text" placeholder="Search Player..." class="w-full bg-white/5 border border-white/10 rounded-lg pl-10 pr-4 py-2 text-xs focus:outline-none focus:border-neonBlue">
                    </div>
                </div>

                <!-- Table -->
                <div class="glass-card overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="bg-white/5 text-[10px] uppercase tracking-widest text-gray-400">
                                    <th class="px-6 py-4">Rank</th>
                                    <th class="px-6 py-4">Player</th>
                                    <th class="px-6 py-4">Region</th>
                                    <th class="px-6 py-4">Tier</th>
                                    <th class="px-6 py-4 text-right">Rating</th>
                                </tr>
                            </thead>
                            <tbody class="text-sm">
                                ${state.players.map((p, i) => `
                                    <tr class="border-b border-white/5 hover:bg-white/5 transition-all cursor-pointer group" onclick="openProfile('${p.name}')">
                                        <td class="px-6 py-4 font-mono text-gray-500">#${i + 1}</td>
                                        <td class="px-6 py-4">

        // --- CORE LOGIC ---

        function render() {
            const root = document.getElementById('app-content');
            if (!state.currentUser) {
                root.innerHTML = AuthView(state.view === 'signup' ? 'signup' : 'login');
                setupAuthListeners();
            } else {
                switch(state.view) {
                    case 'leaderboards': root.innerHTML = LeaderboardView(); break;
                    case 'staff': root.innerHTML = StaffView(); break;
                    case 'rules': root.innerHTML = RulesView(); break;
                    case 'admin': root.innerHTML = state.adminUnlocked ? AdminPanelView() : ''; break;
                    default: root.innerHTML = HomeView();
                }
                window.scrollTo(0,0);
            }
        }

        function navigate(view) {
            state.view = view;
            render();
        }

        function renderAuth(type) {

        function setupAuthListeners() {
            const form = document.getElementById('auth-form');
            if (!form) return;
            form.onsubmit = (e) => {
                e.preventDefault();
                const username = document.getElementById('auth-user').value;
                const pass = document.getElementById('auth-pass').value;

                if (state.view === 'signup') {
                    const confirm = document.getElementById('reg-confirm').value;
                    const email = document.getElementById('reg-email').value;
                    if (username.length < 3) return alert('Username too short');
                    if (pass.length < 8) return alert('Password too short (min 8 characters)');
                    if (pass !== confirm) return alert('Passwords do not match');
                    
                    const users = JSON.parse(localStorage.getItem('tyt_db') || '[]');
                    if (users.find(u => u.username === username)) return alert('Username taken');
                    
                    const newUser = { username, email, password: pass };
                    users.push(newUser);
                    localStorage.setItem('tyt_db', JSON.stringify(users));
                    state.currentUser = newUser;
                    localStorage.setItem('tyt_user', JSON.stringify(newUser));
                } else {
                    const users = JSON.parse(localStorage.getItem('tyt_db') || '[]');
                    const user = users.find(u => u.username === username && u.password === pass);
                    if (!user) return alert('Invalid credentials');
                    state.currentUser = user;
                    localStorage.setItem('tyt_user', JSON.stringify(user));
                }
                state.view = 'home';
                render();
            };
        }

        function logout() {
            localStorage.removeItem('tyt_user');
            state.currentUser = null;
            state.view = 'login';
            render();

        // --- PARTICLES ENGINE ---
        function initParticles() {
            const canvas = document.getElementById('particles');
            const ctx = canvas.getContext('2d');
            let particles = [];
            
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            class Particle {
                constructor() {
                    this.reset();
                }
                reset() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.vx = (Math.random() - 0.5) * 0.5;
                    this.vy = (Math.random() - 0.5) * 0.5;
                    this.size = Math.random() * 2;
                    this.color = Math.random() > 0.5 ? '#00f2ff' : '#bc13fe';
                    this.alpha = Math.random() * 0.5;
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
                }
                draw() {
                    ctx.globalAlpha = this.alpha;
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            for (let i = 0; i < 100; i++) particles.push(new Particle());

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
                requestAnimationFrame(animate);
            }
            animate();
        }

        // --- INIT ---
        window.onload = () => {
            initParticles();
            render();
        };
